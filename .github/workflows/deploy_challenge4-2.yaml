name: Deploy API to EC2

on:
  push:
    branches: [main]
    paths:
      - 'challenge4-2/Backend/**'
      - '.github/workflows/deploy_challenge4-2.yaml'

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: api-container-ec2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./challenge4-2/Backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.API_EC2_INSTANCE_ID }}
          IMAGE: ${{ steps.build-image.outputs.image }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin $ECR_REGISTRY',
              'docker pull $IMAGE',
              'docker stop api || true',
              'docker rm api || true',
              'docker run -d --name api --env-file /app/.env -p 8080:8080 --restart always $IMAGE'
            ]" \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            [ "$STATUS" = "Success" ] && exit 0
            [ "$STATUS" = "Failed" ] && exit 1
            sleep 5
          done
          exit 1